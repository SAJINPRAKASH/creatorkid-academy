<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CreatorKid Academy | Mastering Photoshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript">
      // Restore URL if redirected from GitHub Pages 404.html
      (function() {
        var redirect = window.location.search.match(/[?&]p=([^&]*)/);
        if (redirect && redirect[1]) {
          var decoded = decodeURIComponent(redirect[1]).replace(/~and~/g, '&');
          var search = window.location.search.replace(/([?&])p=[^&]*(&?)/, '$1').replace(/&$/, '').replace(/\?$/, '');
          var hash = window.location.hash;
          window.history.replaceState(null, null, decoded + search + hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
