<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CreatorKid Academy</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages SPA fallback
      var l = window.location;
      var pathSegmentsToKeep = 0; // Handles custom domains or root domain deployments
      
      // Calculate path segments
      var path = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/');
      var search = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';
      var queryParam = '?p=/' + path + search + l.hash;
      var newUrl = l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/' + queryParam;
      l.replace(newUrl);
    </script>
  </head>
  <body>
  </body>
</html>
