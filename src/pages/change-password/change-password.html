<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreatorKid Academy | Change Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="stylesheet" href="./change-password.css">
</head>
<body>
  <div class="change-wrapper">
    <div class="background-glow"></div>
    <div class="change-header">
      <a href="/src/pages/dashboard/dashboard.html" class="logo">
        <img src="../../assets/logo/logo.png" alt="CreatorKid Academy" class="nav-logo" />
      </a>
    </div>

    <div class="change-card">
      <div class="card-header">
        <h2>Change Password</h2>
        <p>Update your account password securely</p>
      </div>

      <form id="change-password-form">
        <div id="alert-box" class="alert-box" style="display: none;"></div>

        <div class="form-group">
          <label for="new-pass">New Password</label>
          <div class="input-wrapper">
            <input type="password" id="new-pass" placeholder="••••••••" required />
          </div>
          <div class="strength-bar-wrapper">
            <div class="strength-bar" id="strength-bar"></div>
          </div>
          <span class="strength-text" id="strength-text">Password strength: Empty</span>
        </div>

        <div class="form-group" style="margin-top: 1rem;">
          <label for="confirm-pass">Confirm New Password</label>
          <div class="input-wrapper">
            <input type="password" id="confirm-pass" placeholder="••••••••" required />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1.5rem;" id="save-btn">Update Password</button>
      </form>

      <div class="card-footer" style="margin-top: 1.5rem; text-align: center;">
        <a href="../dashboard/dashboard.html" class="back-link">← Back to Dashboard</a>
      </div>
    </div>
  </div>

  <script type="module" src="./change-password.js"></script>
</body>
</html>
